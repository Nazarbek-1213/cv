
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: #e2e8f0;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 60px 20px;
}

h1 {
    font-size: 56px;
    font-weight: 600;
    letter-spacing: -1px;
}

.subtitle {
    font-size: 20px;
    color: #94a3b8;
    margin-top: 10px;
}

.buttons {
    margin-top: 30px;
}

button {
    padding: 12px 22px;
    border-radius: 12px;
    border: none;
    margin-right: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
}

.primary {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
}

.secondary {
    background: rgba(255,255,255,0.05);
    color: white;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(59,130,246,0.3);
}

.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 60px;
}

.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(12px);
    transition: 0.3s;
}

.card:hover {
    border-color: rgba(59,130,246,0.4);
}

.big {
    font-size: 48px;
    font-weight: 600;
}

.label {
    color: #94a3b8;
}

.sidebar {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.sidebar button {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    background: rgba(255,255,255,0.05);
}

.fade-in {
    opacity: 0;
    transform: translateY(20px);
    animation: fade 1s forwards;
}

@keyframes fade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media(max-width: 768px) {
    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <button>🏠</button>
    <button>💼</button>
    <button>⚡</button>
    <button>📂</button>
</div>

<div class="container fade-in">

<h1>{{ profile.job }}</h1>
<p class="subtitle">Backend Engineer + AI Integration</p>

<div class="buttons">
    <button class="secondary">View Projects</button>
    <button class="primary">Let's Talk</button>
</div>

<div class="grid">

<div class="card">
    <div class="big">99.7%</div>
    <div class="label">Uptime</div>
</div>

<div class="card">
    <div class="big">15+</div>
    <div class="label">Projects</div>
</div>

<div class="card">
    <div class="big">91%</div>
    <div class="label">Performance</div>
</div>

</div>

</div>

</body>
</html>
